name: Playwright CI/CD Pipeline

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

  schedule:
    - cron: '0 2 * * *'  # Nightly run (2 AM UTC)

jobs:

  smoke-tests:
    name: Smoke Tests (CI)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ENV: dev
      BASE_URL_DEV: https://testautomationpractice.blogspot.com/

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Smoke Tests
        run: npm run test:smoke

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: |
            playwright-report/
            test-results/

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    timeout-minutes: 45

    # Run only on main branch or nightly schedule
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'

    env:
      ENV: dev
      BASE_URL_DEV: https://testautomationpractice.blogspot.com/

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Regression Tests
        run: npm run test:regression

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: |
            playwright-report/
            test-results/
